# https://docs.railway.com/reference/config-as-code
# Pins npm (this repo uses npm workspaces; do not add pnpm-workspace.yaml — Nixpacks would invoke pnpm without installing it).
[build]
builder = "nixpacks"
# Install phase already runs `npm ci`; do not run it again here — a second `npm ci` hits EBUSY on Nixpacks’ node_modules/.cache mount.
buildCommand = "npm run build"

[deploy]
startCommand = "npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
